<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .question-section h1 {
            color: #764ba2;
            font-size: 28px;
            margin-bottom: 30px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .yes-btn {
            background: #ff6b9d;
            color: white;
        }

        .yes-btn:hover {
            background: #ff5287;
            transform: scale(1.05);
        }

        .no-btn {
            background: #4ecdc4;
            color: white;
            position: relative;
        }

        .no-btn:hover {
            background: #45b7aa;
        }

        .response-section {
            display: none;
            animation: slideIn 0.6s ease-in;
        }

        .response-section.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response-section h2 {
            color: #ff6b9d;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .response-section p {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .image-container {
            margin-top: 30px;
            background: #f8f8f8;
            padding: 20px;
            border-radius: 15px;
        }

        svg {
            width: 100%;
            max-width: 400px;
            height: auto;
        }

        .hearts {
            font-size: 30px;
            animation: float 2s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .heart-animation {
            position: fixed;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="question-section" id="questionSection">
            <h1>❤️ Beni Seviyor Musun? ❤️</h1>
            <div class="button-container">
                <button class="yes-btn" onclick="yesClicked()">Evet ✓</button>
                <button class="no-btn" id="noBtn" onmouseover="moveButton()">Hayır ✗</button>
            </div>
        </div>

        <div class="response-section" id="responseSection">
            <div class="hearts">❤️ ❤️ ❤️</div>
            <h2>Biliyordum beni sevdiğini! 😊</h2>
            <p>Ben de seni çok seviyorum! 💕</p>
            <div class="image-container">
                <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <!-- Arka plan -->
                    <rect width="400" height="400" fill="#ffe5f0"/>
                    
                    <!-- Kız figürü -->
                    <g id="girl">
                        <!-- Kız başı -->
                        <circle cx="150" cy="80" r="25" fill="#f4a460"/>
                        <!-- Kız saçı -->
                        <path d="M 125 80 Q 125 50 150 50 Q 175 50 175 80" fill="#8b4513"/>
                        <!-- Kız gövde -->
                        <rect x="135" y="110" width="30" height="50" fill="#ff69b4" rx="5"/>
                        <!-- Kız kollar -->
                        <rect x="110" y="120" width="25" height="10" fill="#f4a460" rx="5"/>
                        <rect x="165" y="120" width="25" height="10" fill="#f4a460" rx="5"/>
                        <!-- Kız bacaklar -->
                        <rect x="140" y="165" width="8" height="40" fill="#333"/>
                        <rect x="152" y="165" width="8" height="40" fill="#333"/>
                        <!-- Kız gözleri -->
                        <circle cx="145" cy="75" r="3" fill="#000"/>
                        <circle cx="155" cy="75" r="3" fill="#000"/>
                        <!-- Kız gülüşü -->
                        <path d="M 145 85 Q 150 88 155 85" stroke="#000" stroke-width="2" fill="none"/>
                    </g>
                    
                    <!-- Erkek figürü -->
                    <g id="boy">
                        <!-- Erkek başı -->
                        <circle cx="250" cy="80" r="25" fill="#f4a460"/>
                        <!-- Erkek saçı -->
                        <path d="M 225 80 Q 225 50 250 50 Q 275 50 275 80" fill="#2c1810"/>
                        <!-- Erkek gövde -->
                        <rect x="235" y="110" width="30" height="50" fill="#4169e1" rx="5"/>
                        <!-- Erkek kollar -->
                        <rect x="210" y="120" width="25" height="10" fill="#f4a460" rx="5"/>
                        <rect x="265" y="120" width="25" height="10" fill="#f4a460" rx="5"/>
                        <!-- Erkek bacaklar -->
                        <rect x="240" y="165" width="8" height="40" fill="#333"/>
                        <rect x="252" y="165" width="8" height="40" fill="#333"/>
                        <!-- Erkek gözleri -->
                        <circle cx="245" cy="75" r="3" fill="#000"/>
                        <circle cx="255" cy="75" r="3" fill="#000"/>
                        <!-- Erkek gülüşü -->
                        <path d="M 245 85 Q 250 88 255 85" stroke="#000" stroke-width="2" fill="none"/>
                    </g>
                    
                    <!-- Kucaklama pozisyonu - Kollar -->
                    <g id="embrace">
                        <!-- Kız sol kolu (dalgalı) -->
                        <path d="M 125 125 Q 100 120 95 150" stroke="#f4a460" stroke-width="8" fill="none" stroke-linecap="round"/>
                        <!-- Erkek sağ kolu (dalgalı) -->
                        <path d="M 275 125 Q 300 120 305 150" stroke="#f4a460" stroke-width="8" fill="none" stroke-linecap="round"/>
                        
                        <!-- Kucaklayan kollar -->
                        <path d="M 165 125 Q 200 130 225 125" stroke="#f4a460" stroke-width="8" fill="none" stroke-linecap="round"/>
                        <path d="M 235 125 Q 200 130 175 125" stroke="#f4a460" stroke-width="8" fill="none" stroke-linecap="round"/>
                    </g>
                    
                    <!-- Kalpler -->
                    <g id="hearts">
                        <!-- Sol taraf kalp -->
                        <path d="M 100 40 Q 95 35 90 40 Q 85 45 100 55 Q 115 45 110 40 Q 105 35 100 40" fill="#ff1493"/>
                        <!-- Sağ taraf kalp -->
                        <path d="M 300 40 Q 295 35 290 40 Q 285 45 300 55 Q 315 45 310 40 Q 305 35 300 40" fill="#ff1493"/>
                        <!-- Orta kalp -->
                        <path d="M 200 30 Q 195 25 190 30 Q 185 35 200 45 Q 215 35 210 30 Q 205 25 200 30" fill="#ff69b4"/>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <script>
        function yesClicked() {
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('responseSection').classList.add('show');
            createHearts();
        }

        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const randomX = Math.random() * 300 - 150;
            const randomY = Math.random() * 300 - 150;
            
            noBtn.style.position = 'relative';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function createHearts() {
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart-animation';
                heart.style.left = Math.random() * window.innerWidth + 'px';
                heart.style.top = Math.random() * window.innerHeight + 'px';
                heart.style.fontSize = Math.random() * 30 + 20 + 'px';
                heart.style.opacity = Math.random() * 0.5 + 0.5;
                
                document.body.appendChild(heart);
                
                animate(heart);
            }
        }

        function animate(heart) {
            let opacity = parseFloat(heart.style.opacity);
            let y = parseInt(heart.style.top);
            
            const interval = setInterval(() => {
                y -= 2;
                opacity -= 0.01;
                heart.style.top = y + 'px';
                heart.style.opacity = opacity;
                
                if (opacity <= 0) {
                    clearInterval(interval);
                    heart.remove();
                }
            }, 30);
        }
    </script>
</body>
</html>
