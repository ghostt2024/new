<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .question-section h1 {
            color: #764ba2;
            font-size: 28px;
            margin-bottom: 30px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .yes-btn {
            background: #ff6b9d;
            color: white;
        }

        .yes-btn:hover {
            background: #ff5287;
            transform: scale(1.05);
        }

        .no-btn {
            background: #4ecdc4;
            color: white;
            position: relative;
        }

        .no-btn:hover {
            background: #45b7aa;
        }

        .response-section {
            display: none;
            animation: slideIn 0.6s ease-in;
        }

        .response-section.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response-section h2 {
            color: #ff6b9d;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .response-section p {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .image-container {
            margin-top: 30px;
            background: #f8f8f8;
            padding: 20px;
            border-radius: 15px;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .hearts {
            font-size: 30px;
            animation: float 2s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .heart-animation {
            position: fixed;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="question-section" id="questionSection">
            <h1>❤️ Beni Seviyor Musun? ❤️</h1>
            <div class="button-container">
                <button class="yes-btn" onclick="yesClicked()">Evet ✓</button>
                <button class="no-btn" id="noBtn" onmouseover="moveButton()">Hayır ✗</button>
            </div>
        </div>

        <div class="response-section" id="responseSection">
            <div class="hearts">❤️ ❤️ ❤️</div>
            <h2>Biliyordum beni sevdiğini! 😊</h2>
            <p>Ben de seni çok seviyorum! 💕</p>
            <div class="image-container">
                <img src="ask.jpg">
            </div>
        </div>
    </div>

    <script>
        function yesClicked() {
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('responseSection').classList.add('show');
            createHearts();
        }

        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const randomX = Math.random() * 300 - 150;
            const randomY = Math.random() * 300 - 150;
            
            noBtn.style.position = 'relative';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function createHearts() {
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart-animation';
                heart.style.left = Math.random() * window.innerWidth + 'px';
                heart.style.top = Math.random() * window.innerHeight + 'px';
                heart.style.fontSize = Math.random() * 30 + 20 + 'px';
                heart.style.opacity = Math.random() * 0.5 + 0.5;
                
                document.body.appendChild(heart);
                
                animate(heart);
            }
        }

        function animate(heart) {
            let opacity = parseFloat(heart.style.opacity);
            let y = parseInt(heart.style.top);
            
            const interval = setInterval(() => {
                y -= 2;
                opacity -= 0.01;
                heart.style.top = y + 'px';
                heart.style.opacity = opacity;
                
                if (opacity <= 0) {
                    clearInterval(interval);
                    heart.remove();
                }
            }, 30);
        }
    </script>
</body>
</html>
